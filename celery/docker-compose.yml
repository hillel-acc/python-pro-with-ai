services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq_broker
    environment:
      # It is best practice to define these explicitly
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      # AMQP protocol port (used by Celery/Python)
      - "5672:5672"
      # HTTP Management UI (accessible in your browser)
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:alpine
    container_name: redis_backend
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  rabbitmq_data: