<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORS Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #status { font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #eee; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>FastAPI CORS Tester</h2>
    <button onclick="testCORS()">Test API Connection</button>
    
    <p>Status: <span id="status">Idle</span></p>
    <pre id="response">Response will appear here...</pre>

    <script>
        async function testCORS() {
            const statusEl = document.getElementById('status');
            const responseEl = document.getElementById('response');
            
            statusEl.innerText = "Connecting...";
            statusEl.className = "";

            try {
                // Change this URL if your FastAPI runs on a different port
                const response = await fetch('http://127.0.0.1:8000/data');
                const data = await response.json();
                
                statusEl.innerText = "Success!";
                statusEl.className = "success";
                responseEl.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                statusEl.innerText = "CORS Error (Check Console)";
                statusEl.className = "error";
                responseEl.innerText = err.message;
            }
        }
    </script>
</body>
</html>
